<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="media/favicon.ico">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/pxd-base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <title>{{PXD_TITLE}}</title>
    <script>
        // Identifies which site + page of room.json this generated file renders.
        window.PXD_PAGE = { site: "{{PXD_SITE}}", page: "{{PXD_PAGE}}" };
    </script>
</head>
<body data-pxd-site="{{PXD_SITE}}" data-pxd-page="{{PXD_PAGE}}">
    <div class="pxd-shell">
        <!-- Optional site-level sticky header (one pane); filled by pxd.js. -->
        <header id="pxd-header" class="pxd-header" hidden></header>

        <!-- Page body: pxd.js renders the ordered pane grid here. -->
        <main id="pxd-page-body" class="pxd-page-body"></main>

        <!-- Optional site-level sticky footer (one pane); filled by pxd.js. -->
        <footer id="pxd-footer" class="pxd-footer" hidden></footer>
    </div>

    <!-- Portal for pane modals (panes inject <div class="modal"> here) -->
    <div id="pxd-modals"></div>

    <!-- Toast container -->
    <div id="pxd-toast-container" style="position:fixed;bottom:16px;right:16px;z-index:1080;pointer-events:none;"></div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/paho-mqtt.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/pxd.js"></script>
</body>
</html>
