api:
  listen: ":1984"
  origin: "*"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"

streams:
  # Scratch discovery config for camera-finder.
  # Production streams live in /opt/paradox/config/go2rtc.yaml (go2rtc.service).
  # When go2rtc.service is already on :1984, camera-finder reuses it and this
  # file is ignored until you stop the system service.
  #
  # Amcrest NV2104E: rtsp://admin:0@NVR:554/cam/realmonitor?channel=N&subtype=0|1

  # ── Houdini NVR @ 10.0.4.90 ──────────────────────────────────────────────
  houdini_foyer:      rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=1&subtype=0#backchannel=0
  houdini_foyer_sub:  rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=1&subtype=1#backchannel=0
  houdini_cell:       rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=2&subtype=0#backchannel=0
  houdini_cell_sub:   rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=2&subtype=1#backchannel=0
  houdini_front_desk: rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=3&subtype=0#backchannel=0
  houdini_study:      rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=4&subtype=0#backchannel=0
  houdini_study_sub:  rtsp://admin:0@10.0.4.90:554/cam/realmonitor?channel=4&subtype=1#backchannel=0

  # ── Agent22 / SpyCatcher NVR @ 10.0.4.140 (for cross-room testing) ───────
  agent22_moscow_closet:      rtsp://admin:0@10.0.4.140:554/cam/realmonitor?channel=1&subtype=0#backchannel=0
  agent22_washington_office:  rtsp://admin:0@10.0.4.140:554/cam/realmonitor?channel=2&subtype=0#backchannel=0
  agent22_washington_closet:  rtsp://admin:0@10.0.4.140:554/cam/realmonitor?channel=3&subtype=0#backchannel=0
  agent22_moscow_office:      rtsp://admin:0@10.0.4.140:554/cam/realmonitor?channel=4&subtype=0#backchannel=0
