<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Streaming Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Camera Streaming Lab</h1>
  <div class="layout-toggle">
    <span>View:</span>
    <button type="button" id="layout-one" class="layout-btn">1 Camera</button>
    <button type="button" id="layout-two" class="layout-btn active">2 Cameras</button>
  </div>
  <div id="resource-stats">
    <span>go2rtc CPU: <strong id="stat-cpu">–</strong></span>
    <span>Mem: <strong id="stat-mem">–</strong></span>
    <span>Net I/O: <strong id="stat-net">–</strong></span>
    <span id="stat-error" class="error"></span>
  </div>
  <nav><a href="grid.html">Multi-tile load test →</a></nav>
</header>

<main class="panels">
  <section class="panel" id="panel-a"></section>
  <section class="panel" id="panel-b"></section>
</main>

<template id="panel-template">
  <div class="panel-controls">
    <label>Stream
      <select class="stream-select"><option value="">– select –</option></select>
    </label>
    <label>Delivery method
      <select class="mode-select">
        <option value="webrtc,mse,hls,mjpeg">Auto (best available)</option>
        <option value="webrtc">WebRTC (UDP)</option>
        <option value="webrtc/tcp">WebRTC (TCP)</option>
        <option value="mse">MSE</option>
        <option value="hls">HLS</option>
        <option value="mp4">MP4 progressive</option>
        <option value="mjpeg">MJPEG</option>
      </select>
    </label>
    <button type="button" class="copy-embed-btn icon-btn" title="Copy the URL another app would use to embed this stream at the selected delivery method">📋 Embed URL</button>
    <button type="button" class="copy-rtsp-btn icon-btn" title="Copy the RTSP restream URL (for mpv/ffmpeg-based apps like PFx)">📺 RTSP URL</button>
    <span class="video-dims"></span>
  </div>
  <div class="url-line"></div>
  <div class="video-holder"></div>
</template>

<script type="module" src="vendor/video-stream.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
