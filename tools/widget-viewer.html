<!DOCTYPE html>
<!--
  PxD Widget Viewer — developer preview tool
  ─────────────────────────────────────────────────────────────────────────────
  Usage:
    From the PxD repo root:
      python3 -m http.server 9090
    Then open:
      http://localhost:9090/tools/widget-viewer.html

  Note: port 8080 is already used by Nginx (packaged room output).

  Chrome requires an HTTP server for cross-directory <script src> loading.
  Firefox can open this file directly via file://.

  OFFLINE ASSET RULE: widgets loaded in this viewer must not reference
  external CDN URLs for fonts, CSS, or scripts. Use inline SVG icons or
  locally vendored files. See docs/WIDGETS.md § Offline assets.

  Adding new widgets:
    1. Create templates/widgets/base/<name>/widget.js + widget.css
    2. Add an entry to WIDGET_CATALOG below.
  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PxD Widget Viewer</title>

    <!-- PxD CSS — provides design tokens and base resets -->
    <link rel="stylesheet" href="../assets/css/pxd-base.css">

    <style>
        /* ── Viewer chrome ───────────────────────────────────────────── */
        :root {
            --vw-sidebar:  264px;
            --vw-bg:       var(--pxd-bg-1, #0c0c0e);
            --vw-surface:  var(--pxd-panel, rgba(20,20,28,0.95));
            --vw-border:   var(--pxd-panel-border, rgba(200,200,220,0.18));
            --vw-ink:      var(--pxd-ink, #e8e8f0);
            --vw-soft:     var(--pxd-ink-soft, #a0a0b8);
            --vw-accent:   var(--pxd-accent, #6f99c8);
            --vw-radius:   var(--pxd-radius, 10px);
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; font-family: system-ui, Arial, sans-serif; }

        body {
            display:    flex;
            background: var(--vw-bg);
            color:      var(--vw-ink);
            font-size:  14px;
        }

        /* ── Sidebar ──────────────────────────────────────────────────── */
        #vw-sidebar {
            width:         var(--vw-sidebar);
            min-width:     var(--vw-sidebar);
            background:    var(--vw-surface);
            border-right:  1px solid var(--vw-border);
            display:       flex;
            flex-direction: column;
            overflow-y:    auto;
            overflow-x:    hidden;
        }

        .sb-head {
            padding:     14px 14px 10px;
            border-bottom: 1px solid var(--vw-border);
        }
        .sb-head h1 {
            font-size:      0.78rem;
            font-weight:    700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color:          var(--vw-accent);
            margin:         0 0 2px;
        }
        .sb-head p {
            font-size:  0.65rem;
            color:      var(--vw-soft);
            margin:     0;
        }

        .sb-section {
            padding:       12px 14px;
            border-bottom: 1px solid var(--vw-border);
            display:       flex;
            flex-direction: column;
            gap:           6px;
        }
        .sb-section h3 {
            font-size:      0.65rem;
            font-weight:    700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color:          var(--vw-soft);
            margin:         0 0 2px;
        }
        .sb-label {
            font-size: 0.7rem;
            color:     var(--vw-soft);
        }

        .sb-ctrl {
            width:        100%;
            background:   rgba(0,0,0,0.35);
            border:       1px solid var(--vw-border);
            color:        var(--vw-ink);
            border-radius: 5px;

            font-family:  inherit;

        textarea.sb-ctrl {

            border:        1px solid var(--vw-border);

            flex-direction: column;
            box-shadow:    var(--pxd-shadow, 0 12px 28px rgba(0,0,0,0.35));

            flex-shrink:     0;

        .vw-card-title {

            text-overflow:  ellipsis;

            color:         var(--pxd-ink-soft, #a0a0b8);

            text-align: center;

        }
        #vw-empty strong { display: block; font-size: 1rem; margin-bottom: 6px; color: var(--vw-ink); }

            background:    var(--vw-surface);
            border:        1px solid var(--vw-border);
            border-radius: 8px;
            overflow:      hidden;

            font-size:      0.65rem;
            font-weight:    700;

            border:       none;

            padding:      2px 5px;
            border-radius: 4px;
            line-height:  1;
        }
        .vw-info-close:hover { background: rgba(255,255,255,0.1); color: var(--vw-ink); }
    </style>
</head>

<!-- ── JavaScript ───────────────────────────────────────────────────────── -->
<script>
'use strict';

// ── PxD mock API ─────────────────────────────────────────────────────────────
// Mirrors the real pxd.js MQTT surface so widget IIFEs run unchanged.
// subscribe(topic, cb)     — registers a callback; returns nothing (matches real API)
// unsubscribe(topic, cb)   — removes a specific callback
// publish(topic, payload)  — logs the outbound message (active widgets)
//
// Internal helpers for the viewer:
//   PxD._deliver(topic, rawString)  — simulate an inbound MQTT message
//   PxD._reset()                   — tear down state between widget loads
// ─────────────────────────────────────────────────────────────────────────────

(function () {
    var _subs      = {};     // topic → [callbacks]
    var _topics   = [];     // ordered list of subscribed topics
    var _reg      = null;   // captured widget definition
    var _lastMsgAt = null;  // Date of last delivered inbound message

    window.PxD = {
        mqtt: {
            subscribe: function (topic, cb) {
                if (!_subs[topic]) {
                    _subs[topic] = [];
                    _topics.push(topic);
                }
                _subs[topic].push(cb);
            },
            unsubscribe: function (topic, cb) {
                var cbs = _subs[topic];
                if (!cbs) return;
                var i = cbs.indexOf(cb);
                if (i >= 0) cbs.splice(i, 1);
            },
            publish: function (topic, payload) {
                logMsg('pub', topic,
                    typeof payload === 'string' ? payload : JSON.stringify(payload));
            }
        },

        widgets: {
            register: function (def) { _reg = def; }
        },

        // Viewer internals — not part of the production API
        _reset: function () {
            _subs      = {};
            _topics    = [];
            _reg       = null;
            _lastMsgAt = null;
        },
        _deliver: function (topic, raw) {
            var cbs = _subs[topic];
            if (cbs && cbs.length) {
                _lastMsgAt = new Date();
                cbs.forEach(function (cb) { cb(raw); });
                logMsg('rcv', topic, raw);
            } else {
                logMsg('miss', topic, raw);
            }
        },
        _getTopics:     function () { return _topics.slice(); },
        _getWidget:     function () { return _reg; },
        _getLastMsgAt:  function () { return _lastMsgAt; }
    };
}());


// ── Auto-scan catalog ─────────────────────────────────────────────────────────
// Discovers widgets by reading Python HTTP server directory listings.
// No manual updates needed — adding a directory is enough.
//
// Tiers:
//   templates  → templates/widgets/base/<name>/      (config-only, never copy JS)
//   examples   → templates/widgets/examples/<name>/  (copy JS, optionally extend)
//   custom     → rooms/<room>/pxd/widgets/<name>/    (room-specific instances)
//
// Directories starting with _ (e.g. _starter) are skipped.
// Each widget dir may contain widget-meta.json with { label, quickStates }.

async function _scanDir(url) {
    try {
        var resp = await fetch(url);
        if (!resp.ok) return [];
        var html = await resp.text();
        var dirs = [];
        var re   = /href="([a-zA-Z0-9][^"]*\/)">/g;
        var m;
        while ((m = re.exec(html)) !== null) {
            var name = m[1].replace(/\/$/, '');
            if (name !== '..') dirs.push(name);
        }
        return dirs;
    } catch (_) { return []; }
}

async function _loadMeta(jsUrl) {
    var metaUrl = jsUrl.replace(/widget\.js$/, 'widget-meta.json');
    try {
        var resp = await fetch(metaUrl);
        return resp.ok ? await resp.json() : null;
    } catch (_) { return null; }
}

async function _buildEntry(dirUrl, name) {
    var js  = dirUrl + name + '/widget.js';
    var css = dirUrl + name + '/widget.css';
    try {
        var chk = await fetch(js, { method: 'HEAD' });
        if (!chk.ok) return null;
    } catch (_) { return null; }
    var meta = await _loadMeta(js);
    return {
        label:       (meta && meta.label)       || name,
        js:          js,
        css:         css,
        quickStates: (meta && meta.quickStates) || []
    };
}

async function _discoverCatalog() {
    var BASE     = '../templates/widgets/base/';
    var EXAMPLES = '../templates/widgets/examples/';
    var ROOMS    = '../rooms/';
    var cat      = { templates: [], examples: [], custom: [] };

    // Base templates — skip _ prefixed (scaffolds, not runnable)
    var baseNames = await _scanDir(BASE);
    for (var i = 0; i < baseNames.length; i++) {
        if (baseNames[i].startsWith('_')) continue;
        var e = await _buildEntry(BASE, baseNames[i]);
        if (e) cat.templates.push(e);
    }

    // Examples
    var exNames = await _scanDir(EXAMPLES);
    for (var j = 0; j < exNames.length; j++) {
        var e2 = await _buildEntry(EXAMPLES, exNames[j]);
        if (e2) cat.examples.push(e2);
    }

    // Room custom widgets
    var rooms = await _scanDir(ROOMS);
    for (var r = 0; r < rooms.length; r++) {
        var widgetsUrl = ROOMS + rooms[r] + '/pxd/widgets/';
        var wNames     = await _scanDir(widgetsUrl);
        for (var w = 0; w < wNames.length; w++) {
            var e3 = await _buildEntry(widgetsUrl, wNames[w]);
            if (e3) {
                e3.label = rooms[r] + ' / ' + e3.label;
                cat.custom.push(e3);
            }
        }
    }

    return cat;
}

        '--pxd-ink':          '#d8f4ff',
        '--pxd-ink-soft':     '#9ad5ea',
        '--pxd-accent':       '#44e0cc',
        '--pxd-accent-alt':   '#6de79a',
        '--pxd-warn':         '#ffcc66',
        '--pxd-danger':       '#ff7272',
        '--pxd-radius':       '14px',
        '--pxd-shadow':       '0 12px 28px rgba(0,0,0,0.35)',
        '--pxd-bg-glow-1':    'rgba(68,224,204,0.20)',
        '--pxd-bg-glow-2':    'rgba(109,231,154,0.17)'
    },
    houdini: {
        '--pxd-bg-1':         '#2e0f0f',
        '--pxd-bg-2':         '#4a1818',
        '--pxd-bg-3':         '#220a0a',
        '--pxd-panel':        'rgba(28,12,9,0.82)',
        '--pxd-panel-border': 'rgba(205,164,94,0.46)',
        '--pxd-ink':          '#f0e5cf',
        '--pxd-ink-soft':     '#d9c7a4',
        '--pxd-accent':       '#d4af6d',
        '--pxd-accent-alt':   '#ead4a0',
        '--pxd-warn':         '#e5c768',
        '--pxd-danger':       '#d86d5f',
        '--pxd-radius':       '14px',
        '--pxd-shadow':       '0 14px 36px rgba(0,0,0,0.45)',
        '--pxd-bg-glow-1':    'rgba(212,175,109,0.20)',
        '--pxd-bg-glow-2':    'rgba(122,42,42,0.28)'
    }
};

// All CSS vars that might be overridden (used when clearing a theme)
var ALL_THEME_VARS = Object.keys(THEMES.agent22);


// ── Card size table (unit = 100px body height, 8px gap, 28px header) ─────────
var SIZE_DIMS = {
    '1x1': { w: 100,  bh: 100 },
    '2x1': { w: 208,  bh: 100 },
    '2x2': { w: 208,  bh: 208 },
    '4x1': { w: 424,  bh: 100 },
    '4x2': { w: 424,  bh: 208 }
};
var HEADER_H = 28;


// ── DOM refs ──────────────────────────────────────────────────────────────────
var widgetSelect = document.getElementById('vw-widget-select');
var themeSelect  = document.getElementById('vw-theme-select');
var cardTitle    = document.getElementById('vw-card-title');
var payloadTA    = document.getElementById('vw-payload');
var topicInput   = document.getElementById('vw-topic');
var sendBtn      = document.getElementById('vw-send-btn');
var quickBtns    = document.getElementById('vw-quick-btns');
var cardContainer = document.getElementById('vw-card-container');
var sizeLabel    = document.getElementById('vw-size-label');
var widgetInfo   = document.getElementById('vw-widget-info');
var statusEl     = document.getElementById('vw-status');
var logEl        = document.getElementById('vw-log');


// ── Status badge ──────────────────────────────────────────────────────────────
function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className   = type || '';
}


// ── MQTT log ──────────────────────────────────────────────────────────────────
function logMsg(dir, topic, payload) {
    var ts   = new Date().toLocaleTimeString();
    var cls  = { rcv: 'rcv', pub: 'pub', miss: 'miss' }[dir] || 'miss';
    var row  = document.createElement('div');
    row.className = 'vw-log-row';
    row.innerHTML =
        '<span class="vw-log-' + cls + '">[' + dir.toUpperCase() + ']</span> ' +
        '<span class="vw-log-ts">' + ts + '</span> ' +
        '<span class="vw-log-topic">' + escHtml(topic) + '</span> ' +
        '<span class="vw-log-payload">' + escHtml(String(payload)) + '</span>';
    logEl.prepend(row);
    while (logEl.children.length > 30) logEl.lastChild.remove();
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('vw-log-clear-btn').addEventListener('click', function () {
    logEl.innerHTML = '<span style="color:var(--vw-soft);font-size:0.7rem">— cleared —</span>';
});


// ── Theme application ─────────────────────────────────────────────────────────
function applyThemeTokens(tokens) {
    ALL_THEME_VARS.forEach(function (v) {
        document.documentElement.style.removeProperty(v);
    });
    Object.keys(tokens).forEach(function (v) {
        document.documentElement.style.setProperty(v, tokens[v]);
    });
}

function applyThemeFromJson(jsonStr) {
    try {
        var data   = JSON.parse(jsonStr);
        var theme  = data.theme || {};
        var TMAP   = {
            bgColor1:    '--pxd-bg-1',
            bgColor2:    '--pxd-bg-2',
            bgColor3:    '--pxd-bg-3',
            panel:       '--pxd-panel',
            panelBorder: '--pxd-panel-border',
            ink:         '--pxd-ink',
            inkSoft:     '--pxd-ink-soft',
            accent:      '--pxd-accent',
            accentAlt:   '--pxd-accent-alt',
            warn:        '--pxd-warn',
            danger:      '--pxd-danger',
            radius:      '--pxd-radius',
            shadow:      '--pxd-shadow',
            fontBody:    '--pxd-font-body',
            fontMono:    '--pxd-font-mono',
            bgGlow1:     '--pxd-bg-glow-1',
            bgGlow2:     '--pxd-bg-glow-2'
        };
        var tokens = {};
        Object.keys(TMAP).forEach(function (k) {
            if (theme[k]) tokens[TMAP[k]] = theme[k];
        });
        applyThemeTokens(tokens);
        setStatus('theme loaded from room.json', 'ok');
    } catch (e) {
        setStatus('invalid room.json: ' + e.message, 'err');
    }
}

themeSelect.addEventListener('change', function () {
    applyThemeTokens(THEMES[themeSelect.value] || {});
});

document.getElementById('vw-load-json-btn').addEventListener('click', function () {
    document.getElementById('vw-load-json-file').click();
});
document.getElementById('vw-load-json-file').addEventListener('change', function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var rdr = new FileReader();
    rdr.onload = function (ev) { applyThemeFromJson(ev.target.result); };
    rdr.readAsText(file);
});


// ── Widget loading ────────────────────────────────────────────────────────────
var _currentCatalog = null;   // the catalog entry for the loaded widget

function loadWidget(catalog) {
    setStatus('loading…');

    // Tear down previous widget
    var prev = PxD._getWidget();
    if (!prev && _currentCatalog) {
        // Widget may have already been replaced by reset; try a no-op unmount
    } else if (prev && prev.unmount) {
        try { prev.unmount(); } catch (e) { /* ignore */ }
    }
    _currentCatalog = null;
    PxD._reset();

    // Clear old dynamic CSS + JS
    document.querySelectorAll('.vw-dyn').forEach(function (el) { el.remove(); });
    cardContainer.innerHTML = '';
    quickBtns.innerHTML     = '';
    sizeLabel.textContent   = '—';
    widgetInfo.textContent  = 'Loading…';
    topicInput.value        = '';

    // Load widget CSS
    var link = document.createElement('link');
    link.rel       = 'stylesheet';
    link.className = 'vw-dyn';
    link.href      = catalog.css;
    document.head.appendChild(link);

    // Load widget JS
    var script = document.createElement('script');
    script.className = 'vw-dyn';
    script.src       = catalog.js;
    script.onerror   = function () {
        setStatus('failed to load ' + catalog.js, 'err');
        cardContainer.innerHTML =
            '<div style="color:#dc3545;font-size:0.8rem;padding:16px">' +
            'Error: could not load widget JS.<br>' +
            'Make sure you are running an HTTP server (see file header).</div>';
    };
    script.onload = function () {
        var def = PxD._getWidget();
        if (!def) {
            setStatus('widget JS did not call PxD.widgets.register()', 'err');
            return;
        }
        _currentCatalog = catalog;
        buildCard(def, catalog);
        setStatus('ready', 'ok');
    };
    document.head.appendChild(script);
}

function buildCard(def, catalog) {
    var size = def.size || '1x1';
    var dims = SIZE_DIMS[size] || SIZE_DIMS['1x1'];
    var totalH = dims.bh + HEADER_H;

    sizeLabel.textContent =
        size + '  —  ' + dims.w + '\u00d7' + totalH + 'px  (body: ' + dims.bh + 'px)';

    // Build card chrome
    var card    = document.createElement('div');
    card.className = 'vw-card';
    card.id        = 'vw-active-card';
    card.style.cssText = 'width:' + dims.w + 'px;height:' + totalH + 'px;';

    var header = document.createElement('div');
    header.className = 'vw-card-header';
    header.innerHTML =
        '<span class="vw-card-title">' + escHtml(cardTitle.value || 'Widget') + '</span>' +
        '<button class="vw-menu-btn" title="Widget menu">&#x22EF;</button>';

    header.querySelector('.vw-menu-btn').addEventListener('click', function (e) {
        e.stopPropagation();
        toggleCardMenu(this, card, def, catalog);
    });

    var body = document.createElement('div');
    body.className     = 'vw-card-body';
    body.style.cssText = 'height:' + dims.bh + 'px;';

    card.appendChild(header);
    card.appendChild(body);
    cardContainer.appendChild(card);

    // Mount widget
    try {
        def.mount(body);
    } catch (e) {
        setStatus('mount() threw: ' + e.message, 'err');
        console.error('[PxD Viewer] mount() error:', e);
    }

    // Update sidebar info
    var topics = PxD._getTopics();
    if (topics.length) topicInput.value = topics[0];
    widgetInfo.textContent =
        'size:      ' + size + '\n' +
        'interactive: ' + def.interactive + '\n' +
        'topic(s): ' + (topics.join(', ') || '(none)') + '\n' +
        'heartbeat: ' + (def.heartbeatTimeoutMs ? def.heartbeatTimeoutMs + ' ms' : 'off');

    // Quick-state buttons
    (catalog.quickStates || []).forEach(function (s) {
        var btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.textContent = s.label;
        btn.style.cssText = 'border-color:' + s.color + ';color:' + s.color +
                            ';background:' + s.color + '1a;';
        btn.addEventListener('click', function () {
            payloadTA.value = s.payload;
            sendMessage();
        });
        quickBtns.appendChild(btn);
    });
}


// ── Card context menu ─────────────────────────────────────────────────────────
var _menuOpen = false;

function closeMenu() {
    var existing = document.querySelector('.vw-menu-popup');
    if (existing) existing.remove();
    _menuOpen = false;
}

function toggleCardMenu(menuBtn, card, def, catalog) {
    if (_menuOpen) { closeMenu(); return; }
    closeMenu();
    _menuOpen = true;

    var rect   = menuBtn.getBoundingClientRect();
    var popup  = document.createElement('div');
    popup.className = 'vw-menu-popup';
    popup.style.cssText =
        'top:'   + (rect.bottom + 5) + 'px;' +
        'right:' + (window.innerWidth - rect.right) + 'px;';

    var isDisabled = card.classList.contains('vw-disabled');

    // ── Enable / Disable ──
    addMenuItem(popup, isDisabled ? 'Enable widget' : 'Disable widget', function () {
        toggleDisabled(card);
        closeMenu();
    });

    addMenuSep(popup);

    // ── Widget info ──
    addMenuItem(popup, 'Show info\u2026', function () {
        closeMenu();
        showInfoOverlay(card, def);
    });

    addMenuSep(popup);

    // ── Reload ──
    addMenuItem(popup, 'Reload widget', function () {
        closeMenu();
        loadWidget(catalog);
    }, 'vw-danger');

    document.body.appendChild(popup);

    // Close on any outside click (deferred so this click doesn't immediately close it)
    setTimeout(function () {
        document.addEventListener('click', closeMenu, { once: true });
    }, 0);
}

function addMenuItem(popup, label, onClick, extraClass) {
    var item = document.createElement('div');
    item.className = 'vw-menu-item' + (extraClass ? ' ' + extraClass : '');
    item.textContent = label;
    item.addEventListener('click', function (e) { e.stopPropagation(); onClick(); });
    popup.appendChild(item);
}

function addMenuSep(popup) {
    var sep = document.createElement('div');
    sep.className = 'vw-menu-sep';
    popup.appendChild(sep);
}

function toggleDisabled(card) {
    var body = card.querySelector('.vw-card-body');
    var isDisabled = card.classList.toggle('vw-disabled');
    if (isDisabled) {
        var overlay = document.createElement('div');
        overlay.className = 'vw-disable-overlay';
        var badge = document.createElement('span');
        badge.className   = 'vw-disable-badge';
        badge.textContent = 'Disabled';
        overlay.appendChild(badge);
        body.appendChild(overlay);
    } else {
        var existing = body.querySelector('.vw-disable-overlay');
        if (existing) existing.remove();
    }
}


// ── Widget info overlay ───────────────────────────────────────────────────────
function showInfoOverlay(card, def) {
    // Toggle: second "Show info" click dismisses it
    var existing = document.getElementById('vw-info-float');
    if (existing) { existing.remove(); return; }

    var bodyEl = card.querySelector('.vw-card-body');
    var rect   = bodyEl.getBoundingClientRect();

    var overlay = document.createElement('div');
    overlay.id        = 'vw-info-float';
    overlay.className = 'vw-info-overlay';
    overlay.style.cssText =
        'left:'  + rect.left  + 'px;' +
        'top:'   + rect.top   + 'px;';

    var topics = PxD._getTopics();

    function timeSince(date) {
        if (!date) return 'never';
        var s = Math.floor((Date.now() - date.getTime()) / 1000);
        if (s < 2)  return 'just now';
        if (s < 60) return s + 's ago';
        var m = Math.floor(s / 60);
        return m + 'm ' + (s % 60) + 's ago';
    }

    var rows = [
        { key: 'Topic',       val: topics.join('\n') || '(none)' },
        { key: 'Last update', val: timeSince(PxD._getLastMsgAt()), live: true },
        { key: 'Size',        val: def.size        || '1x1'  },
        { key: 'Interactive', val: def.interactive  ? 'yes' : 'no' },
        { key: 'Heartbeat',   val: def.heartbeatTimeoutMs
                                    ? def.heartbeatTimeoutMs + ' ms' : 'off' }
    ];

    var liveEl = null;

    rows.forEach(function (r) {
        var row = document.createElement('div');
        row.className = 'vw-info-row';
        var valEl = document.createElement('span');
        valEl.className   = 'vw-info-val';
        valEl.textContent = r.val;
        row.innerHTML = '<span class="vw-info-key">' + escHtml(r.key) + '</span>';
        row.appendChild(valEl);
        overlay.appendChild(row);
        if (r.live) liveEl = valEl;
    });

    // Live-update "last update" every second while the overlay is visible
    var timer = setInterval(function () {
        if (!overlay.parentNode) { clearInterval(timer); return; }
        if (liveEl) liveEl.textContent = timeSince(PxD._getLastMsgAt());
    }, 1000);

    // Close button
    var closeBtn = document.createElement('button');
    closeBtn.className   = 'vw-info-close';
    closeBtn.textContent = '\u2715';
    closeBtn.title       = 'Close';
    closeBtn.addEventListener('click', function () {
        clearInterval(timer);
        overlay.remove();
    });
    overlay.appendChild(closeBtn);

    document.body.appendChild(overlay);
}


// ── Message sending ───────────────────────────────────────────────────────────
function sendMessage() {
    var topics  = PxD._getTopics();
    var topic   = topics[0];
    var payload = payloadTA.value.trim();
    if (!topic)   { setStatus('no topic — load a widget first', 'err'); return; }
    if (!payload) { setStatus('payload is empty', 'err'); return; }
    PxD._deliver(topic, payload);
}

sendBtn.addEventListener('click', sendMessage);

payloadTA.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMessage(); }
});


// ── Card title live update ────────────────────────────────────────────────────
cardTitle.addEventListener('input', function () {
    var el = document.querySelector('.vw-card-title');
    if (el) el.textContent = cardTitle.value;
});


// ── Heartbeat simulation ──────────────────────────────────────────────────────
document.getElementById('vw-stale-btn').addEventListener('click', function () {
    var c = document.getElementById('vw-active-card');
    if (c) c.classList.add('stale');
});
document.getElementById('vw-ok-btn').addEventListener('click', function () {
    var c = document.getElementById('vw-active-card');
    if (c) c.classList.remove('stale');
});


// ── Catalog population (async scan) ──────────────────────────────────────────
var _CATALOG = { templates: [], examples: [], custom: [] };

var _TIERS = [
    { key: 'templates', label: 'Templates'    },
    { key: 'examples',  label: 'Examples'     },
    { key: 'custom',    label: 'Room widgets' }
];

function _populateSelect(catalog) {
    // Remove any existing optgroups
    widgetSelect.querySelectorAll('optgroup').forEach(function (g) { g.remove(); });
    // Remove all non-placeholder options
    Array.from(widgetSelect.options).forEach(function (o) {
        if (o.value !== '') o.remove();
    });

    var total = 0;
    _TIERS.forEach(function (tier) {
        var items = catalog[tier.key] || [];
        if (!items.length) return;
        total += items.length;
        var group = document.createElement('optgroup');
        group.label = tier.label;
        items.forEach(function (entry, i) {
            var opt = document.createElement('option');
            opt.value       = tier.key + ':' + i;
            opt.textContent = entry.label;
            group.appendChild(opt);
        });
        widgetSelect.appendChild(group);
    });
    return total;
}

widgetSelect.addEventListener('change', function () {
    var parts = widgetSelect.value.split(':');
    var items = _CATALOG[parts[0]] || [];
    var entry = items[parseInt(parts[1], 10)];
    if (entry) loadWidget(entry);
});

(async function () {
    setStatus('scanning widgets…');
    _CATALOG = await _discoverCatalog();
    var total = _populateSelect(_CATALOG);
    if (total === 0) {
        setStatus('no widgets found', 'err');
    } else {
        setStatus(total + ' widget' + (total === 1 ? '' : 's') + ' found', 'ok');
    }

    // Auto-load if exactly one widget across all tiers
    var allItems = _TIERS.reduce(function (acc, t) {
        return acc.concat(_CATALOG[t.key] || []);
    }, []);
    if (allItems.length === 1) {
        var tier = _TIERS.find(function (t) { return _CATALOG[t.key].length > 0; });
        if (tier) {
            widgetSelect.value = tier.key + ':0';
            loadWidget(_CATALOG[tier.key][0]);
        }
    }
}());
</script>
